
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্বর্ণের ক্যালকুলেটর</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans Bengali', sans-serif; background: #f3c623; text-align: center; padding: 15px; }
        .calculator {
            background: #ffffff; padding: 15px; width: 90%; max-width: 340px; margin: auto; border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        h2 { font-size: 20px; margin-bottom: 10px; border-bottom: 2px solid #f3c623; padding-bottom: 5px; color: #333; }
        input, button {
            width: 100%; padding: 8px; margin: 5px 0; border-radius: 6px; border: 1px solid #ddd; font-size: 14px;
        }
        button { background: #f3c623; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #d4a317; }
        #result, #finalResult { margin-top: 10px; font-size: 16px; font-weight: bold; color: #333; }
        .btn-row { display: flex; justify-content: space-between; gap: 6px; flex-wrap: wrap; }
        .btn-row button { flex: 1; }
    </style>
</head>
<body>
    <div class="calculator">
        <h2>🔶 Gold & Silver Price Calculator for BD 🔶</h2>

        <input type="number" id="customValue" placeholder="স্বর্ণের দাম (প্রতি ভরি)" oninput="updateResults()" step="any" min="0">
        <input type="number" id="optionalValue" placeholder="মজুরি (প্রতি ভরি)" oninput="calculateResults()" step="any" min="0">
        <input type="number" id="input1" placeholder="ভরি" min="0" oninput="calculateResults()">
        <input type="number" id="input2" placeholder="আনা" min="0" oninput="calculateResults()">
        <input type="number" id="input3" placeholder="রত্তি" min="0" oninput="calculateResults()">
        <input type="number" id="input4" placeholder="পয়েন্ট" min="0" oninput="calculateResults()">
        <input type="number" id="gramInput" placeholder="গ্রাম (যেমন 11.664)" step="any" oninput="convertFromGram()">

        <div class="btn-row">
            <button onclick="clearFields()">🗑 পরিষ্কার</button>
            <button onclick="downloadReceipt()">🧾 ডাউনলোড</button>
        </div>
        <div class="btn-row">
            <button onclick="copyReceipt()">📋 কপি</button>
            <button onclick="shareReceipt()">📤 শেয়ার</button>
        </div>

        <div id="result"></div>
        <div id="finalResult">মোট টাকা = ৳০</div>
    </div>

    <script>
        const GRAM_PER_VORI = 11.664;

        let result1 = 0, totalWage = 0, points = 0, receiptContent = "";

        function updateResults() {
            const customValue = parseFloat(document.getElementById("customValue").value) || 0;
            result1 = customValue / 960;
            calculateResults();
        }

        function calculateResults() {
            let input1 = parseFloat(document.getElementById('input1').value) || 0;
            let input2 = parseFloat(document.getElementById('input2').value) || 0;
            let input3 = parseFloat(document.getElementById('input3').value) || 0;
            let input4 = parseFloat(document.getElementById('input4').value) || 0;
            let optionalValue = parseFloat(document.getElementById('optionalValue').value) || 0;

            // পয়েন্ট গণনা (ভরি/আনা/রত্তি/পয়েন্ট থেকে)
            points = (input1 * 960) + (input2 * 60) + (input3 * 10) + input4;
            totalWage = (optionalValue / 960) * points;

            // ভর/আনা/রত্তি/পয়েন্ট ভাগ করা (প্রদর্শনের জন্য)
            let finalVori = Math.floor(points / 960);
            let remainingPoints = points % 960;
            let finalAna = Math.floor(remainingPoints / 60);
            remainingPoints %= 60;
            // এখানে finalRotti ও finalPoint fractional হতে পারে যদি points fractional হয়
            let finalRotti = Math.floor(remainingPoints / 10);
            let finalPoint = remainingPoints % 10;

            // প্রদর্শনের জন্য পয়েন্টকে দুই দশমিক পর্যন্ত সীমাবদ্ধ করা
            let displayPoint = Number(finalPoint).toFixed(2);

            // গ্রাম হিসাব
            let gramResult = (points / 960) * GRAM_PER_VORI;

            document.getElementById("result").innerHTML = `📏 ওজন: ${finalVori} ভরি, ${finalAna} আনা, ${finalRotti} রত্তি, ${displayPoint} পয়েন্ট | ✨ ${gramResult.toFixed(3)} g`;
            let finalResult = (result1 * points) + totalWage;
            document.getElementById("finalResult").innerText = `🟢 মোট টাকা = ৳${finalResult.toFixed(2)}`;
        }

        function convertFromGram() {
            const gramValue = parseFloat(document.getElementById('gramInput').value) || 0;
            if (gramValue <= 0) {
                // যদি খালি বা শূন্য হয়, কিছু না করে রিটার্ন
                return;
            }

            // গ্রাম → পয়েন্ট কনভার্সন
            // points may be fractional here
            points = (gramValue / GRAM_PER_VORI) * 960;

            // পয়েন্ট → ভরি/আনা/রত্তি/পয়েন্ট (fractional-safe)
            let vori = Math.floor(points / 960);
            let rem = points - (vori * 960); // fractional remainder
            let ana = Math.floor(rem / 60);
            rem = rem - (ana * 60);
            let rotti = Math.floor(rem / 10);
            let point = rem - (rotti * 10); // point can be fractional

            // ইনপুট বক্সে অটো ফিল (point-এ ছোট দশমিক রাখলে internal value রাখা হবে)
            document.getElementById('input1').value = vori;
            document.getElementById('input2').value = ana;
            document.getElementById('input3').value = rotti;
            // input4 (point) এ পুরো কোডের মত পুরো দশমিক রাখলে UI এ অনেক দেখতে সমস্যা হবে,
            // তাই এখানে আমরা input4-এও 2 দশমিক পর্যন্ত দেখাবো, কিন্তু internal 'points' ধরে রাখছি
            document.getElementById('input4').value = Number(point).toFixed(2);

            // এখন রেজাল্ট রিফ্রেশ করব — calculateResults() points কে আবার নির্ণয় করে নেবে
            // কিন্তু calculateResults() এখন input4 থেকে full numeric value নেবে (যা toFixed দিয়ে স্ট্রিং হতে পারে)
            // যাতে internal consistency থাকে, আমরা input4 কে parseFloat করে ব্যবহার করেছি
            calculateResults();
        }

        function clearFields() {
            if (confirm('আপনি কি সব তথ্য মুছতে চান?')) {
                document.querySelectorAll('input').forEach(input => input.value = '');
                document.getElementById("result").innerHTML = "";
                document.getElementById("finalResult").innerText = 'মোট টাকা = ৳০';
                // reset internal variables
                points = 0;
                totalWage = 0;
                result1 = 0;
            }
        }

        function buildReceipt() {
            let customValue = parseFloat(document.getElementById("customValue").value) || 0;
            let optionalValue = parseFloat(document.getElementById("optionalValue").value) || 0;
            let currentDate = new Date().toLocaleString('bn-BD', { dateStyle: 'full', timeStyle: 'short' });

            let finalVori = Math.floor(points / 960);
            let remainingPoints = points % 960;
            let finalAna = Math.floor(remainingPoints / 60);
            remainingPoints %= 60;
            let finalRotti = Math.floor(remainingPoints / 10);
            let finalPoint = remainingPoints % 10;
            let gramResult = (points / 960) * GRAM_PER_VORI;
            let finalResultText = document.getElementById('finalResult').innerText;

            // receipt এও পয়েন্ট দুই দশমিক দেখাচ্ছি
            let receiptPoint = Number(finalPoint).toFixed(2);

            receiptContent = `🔶 Charigram Gold Market 🔶\n-----------------------------------\n📅 রসিদ তৈরির সময়: ${currentDate}\n-----------------------------------\n💰 স্বর্ণের দাম: ৳${customValue} প্রতি ভরি\nপরিণত মান: ${finalVori} ভরি, ${finalAna} আনা, ${finalRotti} রত্তি, ${receiptPoint} পয়েন্ট\n✨ ওজন: ${gramResult.toFixed(3)} গ্রাম\n🔨 প্রতি ভরির মজুরি: ৳${optionalValue.toFixed(2)}\n💵 মোট মজুরি: ৳${totalWage.toFixed(2)}\n-----------------------------------\n${finalResultText}\n-----------------------------------\n✅ ধন্যবাদ!`;
        }

        function downloadReceipt() {
            buildReceipt();
            const blob = new Blob([receiptContent], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Gold_Receipt_${new Date().getTime()}.txt`;
            link.click();
        }

        async function copyReceipt() {
            buildReceipt();
            await navigator.clipboard.writeText(receiptContent);
            alert("✅ রসিদ কপি করা হয়েছে!");
        }

        async function shareReceipt() {
            buildReceipt();
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: "Charigram Gold Market",
                        text: receiptContent
                    });
                } catch (err) {
                    alert("শেয়ার বাতিল করা হয়েছে।");
                }
            } else {
                alert("❌ এই ডিভাইসে শেয়ার ফিচার সমর্থন করে না!");
            }
        }
    </script>
</body>
</html>
